<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div class="container" id="app">
        <div class="display">
            <h1 v-text="displayValue"></h1>
        </div>
    <div class="buttons">
        <ul>
            <li v-on:click="clear()">AC</li>
            <li>+/-</li>
            <li>%</li>
            <li v-on:click="inputOperator('/')">/</li>

            <li v-on:click="inputNumber(7)">7</li>
            <li v-on:click="inputNumber(8)">8</li>
            <li v-on:click="inputNumber(9)">9</li>
            <li v-on:click="inputOperator('*')">*</li>

            <li v-on:click="inputNumber(4)">4</li>
            <li v-on:click="inputNumber(5)">5</li>
            <li v-on:click="inputNumber(6)">6</li>
            <li v-on:click="inputOperator('-')">-</li>

            <li v-on:click="inputNumber(1)">1</li>
            <li v-on:click="inputNumber(2)">2</li>
            <li v-on:click="inputNumber(3)">3</li>
            <li v-on:click="inputOperator('+')">+</li>

            <li v-on:click="inputNumber(0)">0</li>
            <li v-on:click="inputOperator('.')">.</li>
            <li v-on:click="calculate()">=</li>
        </ul>
    </div>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="script.js"></script>
</body>
</html>
